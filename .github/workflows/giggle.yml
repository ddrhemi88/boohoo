name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Build_Jewelry_v2:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Build_Jewelry_v2
          run: |
            npm install
            timeout 223m node giggle.js --job Build_Jewelry_v2
  
