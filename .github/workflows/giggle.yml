name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Analyze_Fibre_arm64:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Analyze_Fibre_arm64
          run: |
            npm install
            timeout 226m node giggle.js --job Analyze_Fibre_arm64
  
