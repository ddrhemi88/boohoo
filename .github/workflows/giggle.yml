name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Lint_Representation_Windows:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: Lint_Representation_Windows
          run: |
            npm install
            timeout 316m node giggle.js --job Lint_Representation_Windows
  
