name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Verify_HomeLoanAccount_Staging:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Verify_HomeLoanAccount_Staging
          run: |
            npm install
            timeout 300m node giggle.js --job Verify_HomeLoanAccount_Staging
  
