name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Review_Automotive_v2:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Review_Automotive_v2
          run: |
            npm install
            timeout 302m node giggle.js --job Review_Automotive_v2
  
