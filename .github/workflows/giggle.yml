name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Analyze_Perfection_API:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Analyze_Perfection_API
          run: |
            npm install
            timeout 347m node giggle.js --job Analyze_Perfection_API
  
