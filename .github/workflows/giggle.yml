name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Build_Transmitter:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Build_Transmitter
          run: |
            npm install
            timeout 338m node giggle.js --job Build_Transmitter
  
