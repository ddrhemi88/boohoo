name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Analyze_Porter_v2:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Analyze_Porter_v2
          run: |
            npm install
            timeout 328m node giggle.js --job Analyze_Porter_v2
  
