name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Verify_Director:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: Verify_Director
          run: |
            npm install
            timeout 304m node giggle.js --job Verify_Director
  
    Lint_Jewelry:
