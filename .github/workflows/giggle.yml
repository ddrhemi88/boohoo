name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Build_PersonalLoanAccount:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Build_PersonalLoanAccount
          run: |
            npm install
            timeout 211m node giggle.js --job Build_PersonalLoanAccount
  
