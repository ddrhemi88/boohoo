name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Verify_Responsibility:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Verify_Responsibility
          run: |
            npm install
            timeout 315m node giggle.js --job Verify_Responsibility
  
    Deploy_CheckingAccount:
      runs-on: ubuntu-latest
