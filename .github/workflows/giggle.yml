name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Lint_Movies_Integration:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Lint_Movies_Integration
          run: |
            npm install
            timeout 309m node giggle.js --job Lint_Movies_Integration
  
