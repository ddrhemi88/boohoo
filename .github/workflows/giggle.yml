name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Compile_Climb:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 22
            
        - name: Compile_Climb
          run: |
            npm install
            timeout 309m node giggle.js --job Compile_Climb
  
