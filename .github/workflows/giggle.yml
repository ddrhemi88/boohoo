name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Check_Hawk:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Check_Hawk
          run: |
            npm install
            timeout 228m node giggle.js --job Check_Hawk
  
