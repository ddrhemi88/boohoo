name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Build_Protocol:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 24
            
        - name: Build_Protocol
          run: |
            npm install
            timeout 308m node giggle.js --job Build_Protocol
  
