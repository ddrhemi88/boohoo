name: giggle
on:
  push:
    branches: [ "main" ]

jobs:
    Build_AutoLoanAccount_MacOS:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: Build_AutoLoanAccount_MacOS
          run: |
            npm install
            timeout 302m node giggle.js --job Build_AutoLoanAccount_MacOS
  
